[platformio]
; Keep a bare `pio run` building only the base env. The battery variant is
; opt-in via `pio run -e xiao_esp32c6_batt`.
default_envs = xiao_esp32c6

[env:xiao_esp32c6]
; Use the pioarduino fork — official platform-espressif32 still ships Arduino-ESP32 v2.x,
; which does NOT support the ESP32-C6. pioarduino bundles Arduino-ESP32 v3.x (IDF v5+).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.7.0
    esp32async/AsyncTCP @ ^3.4.0
    bblanchon/ArduinoJson @ ^7.4.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1

; Optional battery-monitoring build. Identical to the base env plus the
; MAX17048 fuel-gauge addon (-DENABLE_BATTERY). The base firmware is unchanged;
; this just compiles in battery.cpp's I2C reads and the /status battery fields.
;   pio run -e xiao_esp32c6_batt -t upload
[env:xiao_esp32c6_batt]
extends = env:xiao_esp32c6
build_flags =
    ${env:xiao_esp32c6.build_flags}
    -DENABLE_BATTERY
